worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    proxy_connect_timeout 60s;
    proxy_send_timeout    180s;
    proxy_read_timeout    180s;

    # Strip upstream CORS headers so nginx is the sole CORS authority.
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Expose-Headers;

    # Docker's internal DNS — resolves hostnames lazily at request time
    resolver 127.0.0.11 valid=30s ipv6=off;

    map $http_x_request_id $req_id {
        default   $request_id;
        ~.+       $http_x_request_id;
    }

    log_format main '$remote_addr [$time_local] "$request" $status '
                    'req_id=$req_id user=$upstream_http_x_user_id rt=${request_time}s';
    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name _;

        # Use relative Location headers so redirects stay on whatever port/host
        # the client is using (e.g. localhost:3002 via Next.js proxy).
        absolute_redirect off;

        # Next.js dev proxy strips trailing slashes before forwarding.
        # Rewrite /api/v1/<service> → /api/v1/<service>/ so FastAPI routes
        # match without generating a 307 redirect with an internal Docker hostname.
        rewrite ^(/api/v1/[^/?]+)$ $1/ last;

        add_header X-Request-ID $req_id always;

        # CORS
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Request-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;
        if ($request_method = OPTIONS) { return 204; }

        # ── Gateway health ────────────────────────────────────────────────────
        location = /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Auth routes (public — no auth_request) ────────────────────────────
        location /api/v1/auth {
            set $upstream "auth-service:8001";
            proxy_pass         http://$upstream;
            proxy_set_header   X-Request-ID $req_id;
            proxy_set_header   X-Real-IP    $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Public invitation preview ─────────────────────────────────────────
        location ~ ^/api/v1/orgs/invitations/[^/]+$ {
            set $upstream "organization-service:8002";
            proxy_pass         http://$upstream;
            proxy_set_header   X-Request-ID $req_id;
            proxy_set_header   X-Real-IP    $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Protected routes ──────────────────────────────────────────────────

        location /api/v1/users {
            auth_request      /internal/auth/validate;
            auth_request_set  $x_user_id        $upstream_http_x_user_id;
            auth_request_set  $x_org_id         $upstream_http_x_org_id;
            auth_request_set  $x_user_role      $upstream_http_x_user_role;
            auth_request_set  $x_user_email     $upstream_http_x_user_email;
            auth_request_set  $x_user_full_name $upstream_http_x_user_full_name;
            proxy_set_header  X-User-ID        $x_user_id;
            proxy_set_header  X-Org-ID         $x_org_id;
            proxy_set_header  X-User-Role      $x_user_role;
            proxy_set_header  X-User-Email     $x_user_email;
            proxy_set_header  X-User-Full-Name $x_user_full_name;
            proxy_set_header  X-Request-ID $req_id;
            proxy_set_header  X-Real-IP    $remote_addr;
            set $upstream "auth-service:8001";
            proxy_pass http://$upstream;
        }

        location /api/v1/orgs {
            auth_request      /internal/auth/validate;
            auth_request_set  $x_user_id        $upstream_http_x_user_id;
            auth_request_set  $x_org_id         $upstream_http_x_org_id;
            auth_request_set  $x_user_role      $upstream_http_x_user_role;
            auth_request_set  $x_user_email     $upstream_http_x_user_email;
            auth_request_set  $x_user_full_name $upstream_http_x_user_full_name;
            proxy_set_header  X-User-ID        $x_user_id;
            proxy_set_header  X-Org-ID         $x_org_id;
            proxy_set_header  X-User-Role      $x_user_role;
            proxy_set_header  X-User-Email     $x_user_email;
            proxy_set_header  X-User-Full-Name $x_user_full_name;
            proxy_set_header  X-Request-ID $req_id;
            proxy_set_header  X-Real-IP    $remote_addr;
            proxy_set_header  Authorization "";
            set $upstream "organization-service:8002";
            proxy_pass http://$upstream;
        }

        location /api/v1/projects {
            auth_request      /internal/auth/validate;
            auth_request_set  $x_user_id        $upstream_http_x_user_id;
            auth_request_set  $x_org_id         $upstream_http_x_org_id;
            auth_request_set  $x_user_role      $upstream_http_x_user_role;
            auth_request_set  $x_user_email     $upstream_http_x_user_email;
            auth_request_set  $x_user_full_name $upstream_http_x_user_full_name;
            proxy_set_header  X-User-ID        $x_user_id;
            proxy_set_header  X-Org-ID         $x_org_id;
            proxy_set_header  X-User-Role      $x_user_role;
            proxy_set_header  X-User-Email     $x_user_email;
            proxy_set_header  X-User-Full-Name $x_user_full_name;
            proxy_set_header  X-Request-ID $req_id;
            proxy_set_header  Authorization "";
            set $upstream "nexus-project-service-project-service-1:8003";
            proxy_pass http://$upstream;
        }

        location /api/v1/workflows {
            auth_request      /internal/auth/validate;
            auth_request_set  $x_user_id        $upstream_http_x_user_id;
            auth_request_set  $x_org_id         $upstream_http_x_org_id;
            auth_request_set  $x_user_role      $upstream_http_x_user_role;
            auth_request_set  $x_user_email     $upstream_http_x_user_email;
            auth_request_set  $x_user_full_name $upstream_http_x_user_full_name;
            proxy_set_header  X-User-ID        $x_user_id;
            proxy_set_header  X-Org-ID         $x_org_id;
            proxy_set_header  X-User-Role      $x_user_role;
            proxy_set_header  X-User-Email     $x_user_email;
            proxy_set_header  X-User-Full-Name $x_user_full_name;
            proxy_set_header  X-Request-ID $req_id;
            proxy_set_header  Authorization "";
            set $upstream "workflow-service-workflow-service-1:8004";
            proxy_pass http://$upstream;
        }

        location /api/v1/ai {
            auth_request      /internal/auth/validate;
            auth_request_set  $x_user_id        $upstream_http_x_user_id;
            auth_request_set  $x_org_id         $upstream_http_x_org_id;
            auth_request_set  $x_user_role      $upstream_http_x_user_role;
            auth_request_set  $x_user_email     $upstream_http_x_user_email;
            auth_request_set  $x_user_full_name $upstream_http_x_user_full_name;
            proxy_set_header  X-User-ID        $x_user_id;
            proxy_set_header  X-Org-ID         $x_org_id;
            proxy_set_header  X-User-Role      $x_user_role;
            proxy_set_header  X-User-Email     $x_user_email;
            proxy_set_header  X-User-Full-Name $x_user_full_name;
            proxy_set_header  X-Request-ID $req_id;
            proxy_set_header  Authorization "";
            set $upstream "nexus-ai:8005";
            proxy_pass http://$upstream;
        }

        location /api/v1/search {
            auth_request      /internal/auth/validate;
            auth_request_set  $x_user_id        $upstream_http_x_user_id;
            auth_request_set  $x_org_id         $upstream_http_x_org_id;
            auth_request_set  $x_user_role      $upstream_http_x_user_role;
            auth_request_set  $x_user_email     $upstream_http_x_user_email;
            auth_request_set  $x_user_full_name $upstream_http_x_user_full_name;
            proxy_set_header  X-User-ID        $x_user_id;
            proxy_set_header  X-Org-ID         $x_org_id;
            proxy_set_header  X-User-Role      $x_user_role;
            proxy_set_header  X-User-Email     $x_user_email;
            proxy_set_header  X-User-Full-Name $x_user_full_name;
            proxy_set_header  X-Request-ID $req_id;
            proxy_set_header  Authorization "";
            set $upstream "nexus-search:8006";
            proxy_pass http://$upstream;
        }

        location /api/v1/knowledge {
            auth_request      /internal/auth/validate;
            auth_request_set  $x_user_id        $upstream_http_x_user_id;
            auth_request_set  $x_org_id         $upstream_http_x_org_id;
            auth_request_set  $x_user_role      $upstream_http_x_user_role;
            auth_request_set  $x_user_email     $upstream_http_x_user_email;
            auth_request_set  $x_user_full_name $upstream_http_x_user_full_name;
            proxy_set_header  X-User-ID        $x_user_id;
            proxy_set_header  X-Org-ID         $x_org_id;
            proxy_set_header  X-User-Role      $x_user_role;
            proxy_set_header  X-User-Email     $x_user_email;
            proxy_set_header  X-User-Full-Name $x_user_full_name;
            proxy_set_header  X-Request-ID $req_id;
            proxy_set_header  Authorization "";
            set $upstream "nexus-knowledge:8007";
            proxy_pass http://$upstream;
        }

        # WebSocket: browsers cannot set Authorization headers, so JWT is validated inside the service
        location ~ ^/api/v1/chat/channels/[^/]+/ws {
            proxy_http_version 1.1;
            proxy_set_header   Upgrade      $http_upgrade;
            proxy_set_header   Connection   "upgrade";
            proxy_set_header   X-Request-ID $req_id;
            proxy_set_header   Authorization "";
            set $upstream "nexus-chat:8008";
            proxy_pass http://$upstream;
        }

        location /api/v1/chat {
            auth_request      /internal/auth/validate;
            auth_request_set  $x_user_id        $upstream_http_x_user_id;
            auth_request_set  $x_org_id         $upstream_http_x_org_id;
            auth_request_set  $x_user_role      $upstream_http_x_user_role;
            auth_request_set  $x_user_email     $upstream_http_x_user_email;
            auth_request_set  $x_user_full_name $upstream_http_x_user_full_name;
            proxy_set_header  X-User-ID        $x_user_id;
            proxy_set_header  X-Org-ID         $x_org_id;
            proxy_set_header  X-User-Role      $x_user_role;
            proxy_set_header  X-User-Email     $x_user_email;
            proxy_set_header  X-User-Full-Name $x_user_full_name;
            proxy_set_header  X-Request-ID $req_id;
            proxy_set_header  Authorization "";
            set $upstream "nexus-chat:8008";
            proxy_pass http://$upstream;
        }

        location /api/v1/notifications {
            auth_request      /internal/auth/validate;
            auth_request_set  $x_user_id        $upstream_http_x_user_id;
            auth_request_set  $x_org_id         $upstream_http_x_org_id;
            auth_request_set  $x_user_role      $upstream_http_x_user_role;
            auth_request_set  $x_user_email     $upstream_http_x_user_email;
            auth_request_set  $x_user_full_name $upstream_http_x_user_full_name;
            proxy_set_header  X-User-ID        $x_user_id;
            proxy_set_header  X-Org-ID         $x_org_id;
            proxy_set_header  X-User-Role      $x_user_role;
            proxy_set_header  X-User-Email     $x_user_email;
            proxy_set_header  X-User-Full-Name $x_user_full_name;
            proxy_set_header  X-Request-ID $req_id;
            proxy_set_header  Authorization "";
            set $upstream "notification-service-notification-service-1:8009";
            proxy_pass http://$upstream;
        }

        location /api/v1/analytics {
            auth_request      /internal/auth/validate;
            auth_request_set  $x_user_id        $upstream_http_x_user_id;
            auth_request_set  $x_org_id         $upstream_http_x_org_id;
            auth_request_set  $x_user_role      $upstream_http_x_user_role;
            auth_request_set  $x_user_email     $upstream_http_x_user_email;
            auth_request_set  $x_user_full_name $upstream_http_x_user_full_name;
            proxy_set_header  X-User-ID        $x_user_id;
            proxy_set_header  X-Org-ID         $x_org_id;
            proxy_set_header  X-User-Role      $x_user_role;
            proxy_set_header  X-User-Email     $x_user_email;
            proxy_set_header  X-User-Full-Name $x_user_full_name;
            proxy_set_header  X-Request-ID $req_id;
            proxy_set_header  Authorization "";
            set $upstream "nexus-analytics:8010";
            proxy_pass http://$upstream;
        }

        location /api/v1/audit {
            auth_request      /internal/auth/validate;
            auth_request_set  $x_user_id        $upstream_http_x_user_id;
            auth_request_set  $x_org_id         $upstream_http_x_org_id;
            auth_request_set  $x_user_role      $upstream_http_x_user_role;
            auth_request_set  $x_user_email     $upstream_http_x_user_email;
            auth_request_set  $x_user_full_name $upstream_http_x_user_full_name;
            proxy_set_header  X-User-ID        $x_user_id;
            proxy_set_header  X-Org-ID         $x_org_id;
            proxy_set_header  X-User-Role      $x_user_role;
            proxy_set_header  X-User-Email     $x_user_email;
            proxy_set_header  X-User-Full-Name $x_user_full_name;
            proxy_set_header  X-Request-ID $req_id;
            proxy_set_header  Authorization "";
            set $upstream "nexus-audit:8011";
            proxy_pass http://$upstream;
        }

        # ── Internal auth sub-request ─────────────────────────────────────────
        location = /internal/auth/validate {
            internal;
            set $auth_upstream "auth-service:8001";
            proxy_pass              http://$auth_upstream/api/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Original-URI $request_uri;
            proxy_set_header        X-Original-Method $request_method;
        }

        location / {
            return 404 '{"error":"route not found"}';
            add_header Content-Type application/json;
        }
    }
}
