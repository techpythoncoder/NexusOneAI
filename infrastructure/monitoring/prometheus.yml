global:
  scrape_interval: 15s       # Pull metrics every 15 seconds
  evaluation_interval: 15s

scrape_configs:
  # Prometheus scrapes itself
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Scrape each microservice's /metrics endpoint
  - job_name: auth-service
    static_configs:
      - targets: [auth-service:8001]
    metrics_path: /metrics

  - job_name: organization-service
    static_configs:
      - targets: [organization-service:8002]
    metrics_path: /metrics
