name: nexus-org-service

# Push to: github.com/your-org/organization-service
# Run standalone: docker compose up -d

services:

  organization-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: nexus-org
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@org-postgres:5432/${ORG_DB}
    volumes:
      - ./src:/app/src:ro
    ports:
      - "8002:8002"
    depends_on:
      org-postgres:
        condition: service_healthy
    networks:
      - org-internal
      - kafka-docker_default

  org-postgres:
    image: postgres:16-alpine
    container_name: nexus-org-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${ORG_DB}
    volumes:
      - org_postgres_data:/var/lib/postgresql/data
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${ORG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - org-internal

networks:
  org-internal:
    driver: bridge
    name: nexus-org-internal
  kafka-docker_default:
    external: true
    name: kafka-docker_default

volumes:
  org_postgres_data:
    name: nexus_org_postgres_data
