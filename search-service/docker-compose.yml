name: nexus-search-service
services:
  search-service:
    build: {context: ., dockerfile: Dockerfile, target: development}
    container_name: nexus-search
    restart: unless-stopped
    env_file: .env
    volumes: [./src:/app/src:ro]
    ports: ["8006:8006"]
    depends_on:
      search-service-postgres:
        condition: service_healthy
    networks: [search-service-internal, kafka-docker_default, nexus-net]

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: nexus-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
    ports: ['9200:9200']
    volumes: [opensearch_data:/usr/share/opensearch/data]
    networks: [search-service-internal]
  search-service-postgres:
    image: postgres:16-alpine
    container_name: nexus-search-db
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret_2024
      POSTGRES_DB: nexus_search
    volumes: [search_service_postgres_data:/var/lib/postgresql/data]
    ports: ["5445:5432"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_search"], interval: 10s, timeout: 5s, retries: 5}
    networks: [search-service-internal]

networks:
  search-service-internal: {driver: bridge}
  kafka-docker_default: {external: true}
  nexus-net: {external: true}
volumes:
  search_service_postgres_data:
  opensearch_data:
