name: nexus-audit-service
services:
  audit-service:
    build: {context: ., dockerfile: Dockerfile, target: development}
    container_name: nexus-audit
    restart: unless-stopped
    env_file: .env
    volumes: [./src:/app/src:ro]
    ports: ["8011:8011"]
    depends_on:
      audit-service-postgres:
        condition: service_healthy
    networks: [audit-service-internal, kafka-docker_default]
  audit-service-postgres:
    image: postgres:16-alpine
    container_name: nexus-audit-db
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret_2024
      POSTGRES_DB: nexus_audit
    volumes: [audit_service_postgres_data:/var/lib/postgresql/data]
    ports: ["5450:5432"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_audit"], interval: 10s, timeout: 5s, retries: 5}
    networks: [audit-service-internal]

networks:
  audit-service-internal: {driver: bridge}
  kafka-docker_default: {external: true}
volumes:
  audit_service_postgres_data:
